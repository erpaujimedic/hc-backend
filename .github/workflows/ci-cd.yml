# File: .github/workflows/ci-cd.yml
name: HOMS Enterprise CI/CD Pipeline

# Robot akan menyala otomatis setiap kali lo nge-push kode ke branch 'main' atau 'master'
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # TUGAS 1: Menjalankan Robot Penguji (Quality Assurance)
  automated-testing:
    runs-on: ubuntu-latest # Robot berjalan di server Linux super cepat milik GitHub
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Mempercepat instalasi library di masa depan
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🧪 Run Pytest (QA Robot)
      run: |
        pytest -v
        
  # TUGAS 2: Membangun Docker Image (Hanya jalan kalau TUGAS 1 sukses/hijau)
  docker-build:
    needs: automated-testing
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐳 Build Docker Image
      run: |
        docker build -t homs-backend-api:latest .
        echo "✅ Docker Image successfully built and ready for deployment!"